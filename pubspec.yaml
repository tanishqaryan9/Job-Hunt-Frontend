name: posting
description: Job Posting App - Neo Brutalism Flutter Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.7.0
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # OAuth2 / Google Sign In
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.0

  # UI & Animations
  animate_do: ^3.3.4
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.6

  # Maps
  geolocator: ^13.0.0

  #Cities
  geocoding: ^3.0.0

  #Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Share
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
