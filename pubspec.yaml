name: posting
description: Job Posting App - Neo Brutalism Flutter Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.2.0

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # OAuth2 / Google Sign In
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.0

  # UI & Animations
  animate_do: ^3.3.4
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
